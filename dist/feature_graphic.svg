<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f0f13;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#bd00ff;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="20" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1024" height="500" fill="url(#bg-grad)" />

    <!-- Abstract Elements -->
    <circle cx="100" cy="100" r="300" fill="url(#accent-grad)" opacity="0.05" />
    <circle cx="900" cy="400" r="200" fill="url(#accent-grad)" opacity="0.05" />

    <!-- Logo/Icon Element -->
    <g transform="translate(432, 120)">
        <path d="M80 0 L160 30 V100 C160 160 80 200 80 200 C80 200 0 160 0 100 V30 L80 0Z"
            stroke="url(#accent-grad)" stroke-width="8" fill="none" filter="url(#glow)" />
        <circle cx="80" cy="90" r="20" fill="url(#accent-grad)" />
        <rect x="70" y="90" width="20" height="40" rx="5" fill="url(#accent-grad)" />
    </g>

    <!-- Text -->
    <text x="512" y="380" font-family="sans-serif" font-size="60" font-weight="bold" fill="white"
        text-anchor="middle" letter-spacing="10">SHAAK</text>
    <text x="512" y="420" font-family="sans-serif" font-size="20" fill="#a0a0a0"
        text-anchor="middle" letter-spacing="2" text-transform="uppercase">Secure Offline Encryption</text>
</svg>